apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: childapp1
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/git-branch: "image-updater-{{range .Images}}{{.Alias}}-{{.NewTag}}{{end}}"
spec:
  project: default
  source:
    repoURL: https://github.com/anandambitionv2/appofapps.git
    targetRevision: main
    path: sap-prod-app
  destination:
    server: https://kubernetes.default.svc
    namespace: sap-prod-ns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true