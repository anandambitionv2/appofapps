  apiVersion: argocd-image-updater.argoproj.io/v1alpha1
  kind: ImageUpdater
  metadata:
    name: my-image-updater
    namespace: argocd
  spec:
    applicationRefs:
      - namePattern: "childapp1"
        images:
          - alias: frontend
            imageName: acrargotest.azurecr.io/frontend
    
            
        writeBackConfig:
          method: "git"
          gitConfig:
            # writeBackTarget: "helmvalues:./values.yaml"
            branch: "main:image-updater{{range .Images}}-{{.Name}}-{{.NewTag}}{{end}}"