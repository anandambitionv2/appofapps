apiVersion: apps/v1
kind: Deployment
metadata:
  name: sap-prod-app
  namespace: sap-prod-ns
  labels:
    app: sap-prod-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sap-prod-app
  template:
    metadata:
      labels:
        app: sap-prod-app
    spec:
      containers:
      - name: sapprod
        image: acrargotest.azurecr.io/frontend
        ports:
        - containerPort: 80